<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パチンコ特定日チェッカー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: #0f0f1a; color: #eee; min-height: 100vh; }

  /* パスワード画面 */
  #lock-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  #lock-screen h1 { font-size: 1.8rem; color: #f0c040; margin-bottom: 8px; }
  #lock-screen p { color: #aaa; margin-bottom: 30px; }
  #lock-screen input {
    width: 100%; max-width: 300px; padding: 14px; font-size: 1.1rem;
    border: 2px solid #444; border-radius: 10px; background: #1a1a2e;
    color: #eee; text-align: center; margin-bottom: 12px;
  }
  #lock-screen button {
    width: 100%; max-width: 300px; padding: 14px; font-size: 1.1rem;
    background: #f0c040; color: #111; border: none; border-radius: 10px;
    font-weight: bold; cursor: pointer;
  }
  #lock-error { color: #f55; margin-top: 10px; font-size: 0.9rem; }

  /* メイン画面 */
  #main-screen { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
  h1.title { font-size: 1.4rem; color: #f0c040; text-align: center; margin: 16px 0 4px; }
  .subtitle { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 20px; }

  /* 検索フォーム */
  .search-box { background: #1a1a2e; border-radius: 14px; padding: 18px; margin-bottom: 16px; }
  .search-box label { font-size: 0.85rem; color: #aaa; display: block; margin-bottom: 6px; }
  .search-box input[type="date"] {
    width: 100%; padding: 12px; font-size: 1rem; border: 2px solid #333;
    border-radius: 10px; background: #0f0f1a; color: #eee; margin-bottom: 14px;
  }
  .area-btns { display: flex; gap: 8px; margin-bottom: 14px; }
  .area-btn {
    flex: 1; padding: 10px; border: 2px solid #333; border-radius: 10px;
    background: #0f0f1a; color: #aaa; font-size: 0.95rem; cursor: pointer;
  }
  .area-btn.active { border-color: #f0c040; color: #f0c040; background: #1a1600; }
  .search-btn {
    width: 100%; padding: 14px; font-size: 1.1rem; font-weight: bold;
    background: linear-gradient(135deg, #f0c040, #e08020); color: #111;
    border: none; border-radius: 10px; cursor: pointer;
  }
  .search-btn:active { opacity: 0.85; }

  /* 結果エリア */
  #results { display: none; }
  .result-date { text-align: center; font-size: 0.9rem; color: #888; margin-bottom: 16px; }
  .result-date span { color: #f0c040; font-weight: bold; }

  /* ランキング */
  .section-title {
    font-size: 1rem; font-weight: bold; color: #f0c040;
    margin-bottom: 12px; padding-left: 4px;
  }
  .rank-card {
    background: #1a1a2e; border-radius: 14px; padding: 14px 16px;
    margin-bottom: 10px; border-left: 4px solid #555;
  }
  .rank-card.rank-1 { border-left-color: #ffd700; }
  .rank-card.rank-2 { border-left-color: #c0c0c0; }
  .rank-card.rank-3 { border-left-color: #cd7f32; }
  .rank-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .rank-medal { font-size: 1.4rem; }
  .rank-name { font-size: 1.05rem; font-weight: bold; color: #fff; flex: 1; }
  .rank-area { font-size: 0.75rem; background: #333; color: #aaa; padding: 2px 8px; border-radius: 20px; }
  .rank-score {
    font-size: 0.8rem; background: #f0c040; color: #111;
    padding: 2px 8px; border-radius: 20px; font-weight: bold;
  }
  .rank-patterns { display: flex; flex-wrap: wrap; gap: 6px; }
  .pattern-tag {
    font-size: 0.75rem; background: #2a2a40; color: #aad4f5;
    padding: 3px 10px; border-radius: 20px; border: 1px solid #3a3a60;
  }

  /* 全店舗リスト */
  .all-list { margin-top: 20px; }
  .shop-row {
    display: flex; align-items: center; padding: 10px 14px;
    background: #1a1a2e; border-radius: 10px; margin-bottom: 6px; gap: 10px;
  }
  .shop-rank-num { font-size: 0.8rem; color: #666; width: 24px; text-align: center; }
  .shop-name-wrap { flex: 1; }
  .shop-name { font-size: 0.95rem; }
  .shop-patterns-small { font-size: 0.72rem; color: #888; margin-top: 2px; }
  .shop-area-badge { font-size: 0.7rem; color: #aaa; background: #222; padding: 2px 7px; border-radius: 20px; }
  .shop-score-badge { font-size: 0.72rem; background: #2a2a40; color: #aad4f5; padding: 2px 8px; border-radius: 20px; }

  .no-result { text-align: center; color: #666; padding: 40px 0; font-size: 0.95rem; }
  .count-badge { font-size: 0.85rem; color: #888; margin-bottom: 10px; }

  /* リンクボタン（定義は下部の2列グリッド版を使用） */

  /* タブ */
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab-btn {
    flex: 1; padding: 11px; border: 2px solid #333; border-radius: 10px;
    background: #0f0f1a; color: #aaa; font-size: 0.95rem; cursor: pointer; font-weight: bold;
  }
  .tab-btn.active { border-color: #f0c040; color: #f0c040; background: #1a1600; }

  /* 店名検索 */
  #shop-search-box { background: #1a1a2e; border-radius: 14px; padding: 18px; margin-bottom: 16px; display: none; }
  #shop-search-box label { font-size: 0.85rem; color: #aaa; display: block; margin-bottom: 6px; }
  #shop-name-input {
    width: 100%; padding: 12px; font-size: 1rem; border: 2px solid #333;
    border-radius: 10px; background: #0f0f1a; color: #eee; margin-bottom: 14px;
  }
  #shop-search-results { display: none; }
  .shop-detail-card {
    background: #1a1a2e; border-radius: 14px; padding: 16px; margin-bottom: 14px;
    border-left: 4px solid #f0c040;
  }
  .shop-detail-name { font-size: 1.1rem; font-weight: bold; color: #fff; margin-bottom: 4px; }
  .shop-detail-area { font-size: 0.75rem; background: #333; color: #aaa; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-bottom: 12px; }
  /* .shop-detail-section は下部の flex 版で定義 */
  .shop-detail-patterns { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .upcoming-month { margin-bottom: 12px; }
  .upcoming-month-label { font-size: 0.8rem; color: #888; margin-bottom: 6px; }
  .upcoming-dates { display: flex; flex-wrap: wrap; gap: 6px; }
  .date-chip {
    font-size: 0.8rem; background: #0f2a1a; color: #5dcc8a;
    padding: 4px 10px; border-radius: 20px; border: 1px solid #1a4a2a;
  }
  .date-chip.today { background: #2a1a00; color: #f0c040; border-color: #4a3000; font-weight: bold; }
  .suggest-list { background: #0f0f1a; border: 1px solid #333; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
  .suggest-item { padding: 11px 14px; font-size: 0.95rem; cursor: pointer; border-bottom: 1px solid #1a1a2e; }
  .suggest-item:last-child { border-bottom: none; }
  .suggest-item:hover, .suggest-item:active { background: #1a1a2e; }
  .suggest-area { font-size: 0.72rem; color: #888; margin-left: 8px; }

  /* リンクボタン：2列グリッド */
  .shop-links { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 10px 0; }
  .link-btn { display: block; text-align: center; padding: 8px 4px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; text-decoration: none; }
  .link-btn-map     { background: #1a3a1a; color: #5dcc8a; border: 1px solid #2a5a2a; }
  .link-btn-web     { background: #1a1a3a; color: #7ab0ff; border: 1px solid #2a2a5a; }
  .link-btn-pworld  { background: #3a1a1a; color: #ff8a8a; border: 1px solid #5a2a2a; }
  .link-btn-daidata { background: #2a1a3a; color: #c07aff; border: 1px solid #4a2a5a; }
  .link-btn-site7   { background: #3a2a1a; color: #ffb07a; border: 1px solid #5a3a2a; }

  /* 店舗情報タグ */
  .shop-info-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .shop-info-tag { font-size: 0.8rem; background: #222; color: #ccc; padding: 3px 10px; border-radius: 20px; border: 1px solid #333; }
  .specialty-tag { background: #1a2a1a; color: #8ddc8a; border-color: #2a4a2a; }

  /* 店舗詳細セクションヘッダー */
  .shop-detail-section { display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; color: #f0c040; font-weight: bold; margin: 12px 0 6px; }
  .event-add-btn { font-size: 0.75rem; padding: 3px 10px; background: #2a3a1a; color: #8ddc8a; border: 1px solid #3a5a2a; border-radius: 20px; cursor: pointer; }

  /* イベント */
  .event-list { margin-bottom: 8px; }
  .event-item { font-size: 0.85rem; color: #ddd; padding: 5px 0; border-bottom: 1px solid #222; }
  .event-date { color: #f0c040; font-weight: bold; margin-right: 6px; }
  .event-empty { font-size: 0.8rem; color: #555; padding: 4px 0; }
  .event-form { display: none; gap: 6px; flex-wrap: wrap; margin: 6px 0; }
  .event-form input { min-width: 100px; }
</style>
</head>
<body>

<!-- パスワード画面 -->
<div id="lock-screen">
  <div style="font-size:2.5rem;margin-bottom:12px;">🎰</div>
  <h1>特定日チェッカー</h1>
  <p>総武線沿い版</p>
  <input type="password" id="pw-input" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')checkPw()">
  <button onclick="checkPw()">ログイン</button>
  <div id="lock-error"></div>
</div>

<!-- メイン画面 -->
<div id="main-screen">
  <h1 class="title">🎰 特定日チェッカー</h1>
  <p class="subtitle">総武線沿い版（千葉〜秋葉原）</p>

  <!-- タブ切り替え -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-date" onclick="switchTab('date')">📅 日付で探す</button>
    <button class="tab-btn" id="tab-shop" onclick="switchTab('shop')">🔍 店名で探す</button>
  </div>

  <div class="search-box" id="date-search-box">
    <label>📅 日付を選択</label>
    <input type="date" id="date-input">

    <label>📍 エリア</label>
    <div class="area-btns">
      <button class="area-btn active" data-area="tokyo" onclick="selectArea(this)">東京</button>
      <button class="area-btn" data-area="chiba" onclick="selectArea(this)">千葉</button>
      <button class="area-btn" data-area="both" onclick="selectArea(this)">両方</button>
    </div>

    <button class="search-btn" onclick="doSearch()">🔍 検索する</button>
  </div>

  <!-- 店名検索ボックス -->
  <div id="shop-search-box">
    <label>🏪 店名を入力（一部でもOK）</label>
    <input type="text" id="shop-name-input" placeholder="例：マルハン、エスパス、PIA..." oninput="onShopInput(this.value)">
    <div id="suggest-list"></div>
    <button class="search-btn" onclick="doShopSearch()">🔍 この店の特定日を見る</button>
  </div>

  <!-- 店名検索結果 -->
  <div id="shop-search-results"></div>

  <div id="results">
    <div class="result-date" id="result-label"></div>

    <div class="section-title">🏆 おすすめランキング TOP3</div>
    <div id="ranking"></div>

    <div class="all-list">
      <div class="section-title">📋 全該当店舗一覧</div>
      <div class="count-badge" id="count-label"></div>
      <div id="shop-list"></div>
    </div>
  </div>
</div>

<script>
// ===== パスワード =====
const PASSWORD = "777";

function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === PASSWORD) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    // 今日の日付をデフォルト設定
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth()+1).padStart(2,'0');
    const dd = String(today.getDate()).padStart(2,'0');
    document.getElementById('date-input').value = `${yyyy}-${mm}-${dd}`;
  } else {
    document.getElementById('lock-error').textContent = 'パスワードが違います';
  }
}

// ===== エリア選択 =====
let selectedArea = 'tokyo';
function selectArea(btn) {
  document.querySelectorAll('.area-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedArea = btn.dataset.area;
}

// ===== リンク生成 =====
function getMapsLink(name) {
  return `https://www.google.com/maps/search/${encodeURIComponent(name)}`;
}

function getWebsiteLink(name) {
  const hp = SHOPS[name]?.hp;
  if (hp) return hp;
  // 公式HPが未登録の場合はGoogle検索
  return `https://www.google.com/search?q=${encodeURIComponent(name + ' 公式サイト')}`;
}

// pworld:p-worldパス daidata:台データオンラインID site7:サイトセブンURL

function getPWorldLink(name) {
  const path = SHOPS[name]?.pworld;

  return `https://www.google.com/search?q=site:p-world.co.jp+${encodeURIComponent(name)}`;

function getDaidataLink(name) {
  const id = SHOPS[name]?.daidata;
  if (id) return `https://daidata.goraggio.com/${id}`;
  // IDが未登録の場合はGoogle検索（台データオンラインの店舗ページに辿り着ける）
  return `https://www.google.com/search?q=${encodeURIComponent(name + ' 台データオンライン')}`;
}

// ===== 全店舗リストを生成（サジェスト用）=====
function getAllShops() {
  const all = [];
  for (const area of ['tokyo','chiba']) {
    const seen = new Set();
    for (const pat of Object.keys(DATA[area])) {
      for (const name of DATA[area][pat]) {
        if (!seen.has(name)) { seen.add(name); all.push({ name, area }); }
      }
    }
  }
  return all;
}

let allShops = null;
let selectedShop = null;

function onShopInput(val) {
  if (!allShops) allShops = getAllShops();
  const el = document.getElementById('suggest-list');
  if (!val.trim()) { el.innerHTML = ''; return; }
  const q = val.trim();
  const matched = allShops.filter(s => s.name.includes(q)).slice(0, 10);
  if (matched.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = '<div class="suggest-list">' +
    matched.map(s =>
      `<div class="suggest-item" onclick="selectShop('${s.name.replace(/'/g,"\\'")}','${s.area}')">
        ${s.name}<span class="suggest-area">${s.area === 'tokyo' ? '東京' : '千葉'}</span>
      </div>`
    ).join('') + '</div>';
}

function selectShop(name, area) {
  selectedShop = { name, area };
  document.getElementById('shop-name-input').value = name;
  document.getElementById('suggest-list').innerHTML = '';
}

function doShopSearch() {
  const inputVal = document.getElementById('shop-name-input').value.trim();
  if (!inputVal) { alert('店名を入力してください'); return; }
  if (!allShops) allShops = getAllShops();

  // 入力値で再マッチ（selectShopされていない場合も対応）
  const targets = allShops.filter(s => s.name.includes(inputVal));
  if (targets.length === 0) {
    document.getElementById('shop-search-results').style.display = 'block';
    document.getElementById('shop-search-results').innerHTML =
      '<div class="no-result">「' + inputVal + '」に一致する店舗が見つかりませんでした</div>';
    return;
  }

  const html = targets.map(s => renderShopDetail(s.name, s.area)).join('');
  const el = document.getElementById('shop-search-results');
  el.innerHTML = '<div class="section-title">🏪 店舗の特定日情報</div>' + html;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth' });
}

function renderShopDetail(name, area) {
  // このお店が持つパターンを収集
  const patterns = [];
  for (const pat of Object.keys(DATA[area])) {
    if ((DATA[area][pat] || []).includes(name)) patterns.push(pat);
  }
  if (patterns.length === 0) return '';

  const patLabels = patterns.map(p => `<span class="pattern-tag">${getPatternLabel(p)}</span>`).join('');

  // 直近2ヶ月の特定日を計算
  const today = new Date();
  today.setHours(0,0,0,0);
  const upcomingHTML = renderUpcoming(patterns, today);

  // 店舗マスター情報
  const s = SHOPS[name] || {};
  const infoHTML = (() => {
    let h = '';
    if (s.station) h += `<span class="shop-info-tag">🚶 ${s.station}駅 徒歩${s.walk}分</span>`;
    if (s.exchange) h += `<span class="shop-info-tag">💱 ${s.exchange}</span>`;
    if (s.specialty && s.specialty.length) h += s.specialty.map(t => `<span class="shop-info-tag specialty-tag">🏷️ ${t}</span>`).join('');
    return h ? `<div class="shop-info-row">${h}</div>` : '';
  })();

  // イベント情報（静的 + localStorage）
  const savedStr = localStorage.getItem('events_' + name);
  const savedEvents = savedStr ? JSON.parse(savedStr) : [];
  const allEvents = [...(s.events || []), ...savedEvents]
    .sort((a, b) => a.date.localeCompare(b.date))
    .filter(e => e.date >= new Date().toISOString().slice(0,10));
  const eventsHTML = allEvents.length
    ? allEvents.map(e => `<div class="event-item">📅 <span class="event-date">${e.date.slice(5).replace('-','/')}</span> ${e.name}</div>`).join('')
    : '<div class="event-empty">登録イベントなし</div>';

  const safeName = name.replace(/'/g, "\\'");
  return `
    <div class="shop-detail-card">
      <div class="shop-detail-name">${name}</div>
      <span class="shop-detail-area">${area === 'tokyo' ? '東京' : '千葉'}</span>
      ${infoHTML}
      ${shopLinksHTML(name)}
      <div class="shop-detail-section">📅 特定日パターン</div>
      <div class="shop-detail-patterns">${patLabels}</div>
      <div class="shop-detail-section">📆 直近の特定日（今日〜2ヶ月）</div>
      ${upcomingHTML}
      <div class="shop-detail-section">🎉 イベント情報
        <button class="event-add-btn" onclick="showEventForm('${safeName}')">＋ 追加</button>
      </div>
      <div class="event-list" id="evlist-${CSS.escape(name)}">${eventsHTML}</div>
      <div class="event-form" id="evform-${CSS.escape(name)}" style="display:none">
        <input type="date" id="evdate-${CSS.escape(name)}" style="flex:1;padding:8px;border-radius:8px;border:1px solid #444;background:#0f0f1a;color:#eee">
        <input type="text" id="evname-${CSS.escape(name)}" placeholder="イベント内容" style="flex:2;padding:8px;border-radius:8px;border:1px solid #444;background:#0f0f1a;color:#eee">
        <button onclick="saveEvent('${safeName}')" style="padding:8px 12px;background:#f0c040;color:#111;border:none;border-radius:8px;font-weight:bold;cursor:pointer">保存</button>
        <button onclick="cancelEventForm('${safeName}')" style="padding:8px 12px;background:#333;color:#aaa;border:none;border-radius:8px;cursor:pointer">✕</button>
      </div>
    </div>`;
}

function showEventForm(name) {
  document.getElementById('evform-' + CSS.escape(name)).style.display = 'flex';
}
function cancelEventForm(name) {
  document.getElementById('evform-' + CSS.escape(name)).style.display = 'none';
}
function saveEvent(name) {
  const dateEl = document.getElementById('evdate-' + CSS.escape(name));
  const nameEl = document.getElementById('evname-' + CSS.escape(name));
  if (!dateEl.value || !nameEl.value.trim()) { alert('日付とイベント内容を入力してください'); return; }
  const key = 'events_' + name;
  const existing = JSON.parse(localStorage.getItem(key) || '[]');
  existing.push({ date: dateEl.value, name: nameEl.value.trim() });
  existing.sort((a,b) => a.date.localeCompare(b.date));
  localStorage.setItem(key, JSON.stringify(existing));
  dateEl.value = '';
  nameEl.value = '';
  document.getElementById('evform-' + CSS.escape(name)).style.display = 'none';
  // イベントリスト再描画
  const today = new Date().toISOString().slice(0,10);
  const s = SHOPS[name] || {};
  const allEvents = [...(s.events || []), ...existing]
    .sort((a,b) => a.date.localeCompare(b.date))
    .filter(e => e.date >= today);
  document.getElementById('evlist-' + CSS.escape(name)).innerHTML = allEvents.length
    ? allEvents.map(e => `<div class="event-item">📅 <span class="event-date">${e.date.slice(5).replace('-','/')}</span> ${e.name}</div>`).join('')
    : '<div class="event-empty">登録イベントなし</div>';
}

function renderUpcoming(patterns, today) {
  // 今月と来月の特定日を計算
  const months = [
    new Date(today.getFullYear(), today.getMonth(), 1),
    new Date(today.getFullYear(), today.getMonth() + 1, 1)
  ];

  let html = '';
  for (const monthStart of months) {
    const yr = monthStart.getFullYear();
    const mo = monthStart.getMonth(); // 0-indexed
    const lastDay = new Date(yr, mo + 1, 0).getDate();
    const matchDays = new Set();

    for (let d = 1; d <= lastDay; d++) {
      const date = new Date(yr, mo, d);
      const ap = getActivePatterns(date);
      if (ap.some(p => patterns.includes(p))) matchDays.add(d);
    }

    if (matchDays.size === 0) continue;

    const chips = [...matchDays].sort((a,b) => a-b).map(d => {
      const dt = new Date(yr, mo, d);
      dt.setHours(0,0,0,0);
      const isToday = dt.getTime() === today.getTime();
      const isPast = dt < today;
      if (isPast && !isToday) return '';
      const wday = WEEKDAYS[dt.getDay()];
      return `<span class="date-chip${isToday ? ' today' : ''}">${d}日(${wday})${isToday ? '★今日' : ''}</span>`;
    }).filter(Boolean).join('');

    if (!chips) continue;
    html += `<div class="upcoming-month">
      <div class="upcoming-month-label">${yr}年${mo+1}月</div>
      <div class="upcoming-dates">${chips}</div>
    </div>`;
  }
  return html || '<div style="color:#666;font-size:0.85rem;">直近2ヶ月の特定日はありません</div>';
}

// ===== パターン計算 =====
const WEEKDAYS = ["日","月","火","水","木","金","土"];

function getPatternLabel(key, date = null) {
  if (key.startsWith('d')) {
    const d = key[1];
    return d === '0' ? '0のつく日' : `${d}のつく日`;
  }
  if (key.startsWith('m')) return `毎月${key.slice(1)}日`;
  if (key.startsWith('w')) return `毎週${WEEKDAYS[parseInt(key[1])]}曜日`;
  if (key.startsWith('nth_')) {
    const [,n,w] = key.split('_');
    return `毎月第${n}${WEEKDAYS[parseInt(w)]}曜日`;
  }
  if (key.startsWith('last_')) return `毎月最終${WEEKDAYS[parseInt(key[5])]}曜日`;
  if (key === 'zorome') return 'ゾロ目（11・22日）';
  if (key === 'md') return '月日が重なる日';
  return key;
}

function getActivePatterns(date) {
  const day = date.getDate();
  const month = date.getMonth() + 1;
  const weekday = date.getDay();
  const dayStr = String(day);
  const patterns = [];

  // 数字のつく日（1の位で判定）
  const onesDigit = day % 10;
  patterns.push(`d${onesDigit}`);

  // 毎月○日
  patterns.push(`m${day}`);

  // 毎週○曜日
  patterns.push(`w${weekday}`);

  // 毎月第○△曜日
  const firstDayOfMonth = new Date(date.getFullYear(), date.getMonth(), 1).getDay();
  const firstOccurrence = ((weekday - firstDayOfMonth + 7) % 7) + 1;
  const nth = Math.floor((day - firstOccurrence) / 7) + 1;
  patterns.push(`nth_${nth}_${weekday}`);

  // 毎月最終○曜日
  const lastDay = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
  if (day + 7 > lastDay) patterns.push(`last_${weekday}`);

  // ゾロ目
  if (day === 11 || day === 22) patterns.push('zorome');

  // 月日が重なる
  if (month === day) patterns.push('md');

  return patterns;
}

// ===== 検索実行 =====
function doSearch() {
  const dateVal = document.getElementById('date-input').value;
  if (!dateVal) { alert('日付を選択してください'); return; }

  const date = new Date(dateVal + 'T00:00:00');
  const patterns = getActivePatterns(date);
  const areas = selectedArea === 'both' ? ['tokyo','chiba'] : [selectedArea];

  // 店舗ごとにスコアとパターン名を集計
  const shopMap = {};
  for (const area of areas) {
    for (const pat of patterns) {
      const shops = DATA[area][pat] || [];
      for (const name of shops) {
        const key = `${area}::${name}`;
        if (!shopMap[key]) shopMap[key] = { name, area, labels: [], score: 0 };
        shopMap[key].labels.push(getPatternLabel(pat, date));
        shopMap[key].score++;
      }
    }
  }

  const sorted = Object.values(shopMap).sort((a,b) => b.score - a.score);

  // 表示
  const yyyy = date.getFullYear();
  const mm = date.getMonth()+1;
  const dd = date.getDate();
  const wday = WEEKDAYS[date.getDay()];
  document.getElementById('result-label').innerHTML =
    `<span>${yyyy}年${mm}月${dd}日（${wday}）</span> の結果`;

  renderRanking(sorted.slice(0,3));
  renderList(sorted);

  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

const MEDALS = ['🥇','🥈','🥉'];
const AREA_LABEL = { tokyo: '東京', chiba: '千葉' };

function renderRanking(top) {
  const el = document.getElementById('ranking');
  if (top.length === 0) {
    el.innerHTML = '<div class="no-result">該当店舗がありません</div>';
    return;
  }
  el.innerHTML = top.map((s,i) => `
    <div class="rank-card rank-${i+1}">
      <div class="rank-header">
        <span class="rank-medal">${MEDALS[i]}</span>
        <span class="rank-name">${s.name}</span>
        <span class="rank-area">${AREA_LABEL[s.area]}</span>
        <span class="rank-score">${s.score}パターン</span>
      </div>
      <div class="rank-patterns">
        ${s.labels.map(l => `<span class="pattern-tag">${l}</span>`).join('')}
      </div>
      ${shopLinksHTML(s.name)}
    </div>
  `).join('');
}

function renderList(shops) {
  document.getElementById('count-label').textContent = `${shops.length}店舗が該当`;
  const el = document.getElementById('shop-list');
  if (shops.length === 0) {
    el.innerHTML = '<div class="no-result">該当店舗がありません</div>';
    return;
  }
  el.innerHTML = shops.map((s,i) => `
    <div class="shop-row">
      <span class="shop-rank-num">${i+1}</span>
      <div class="shop-name-wrap">
        <div class="shop-name">${s.name}</div>
        <div class="shop-patterns-small">${s.labels.join(' / ')}</div>
        ${shopLinksHTML(s.name)}
      </div>
      <span class="shop-area-badge">${AREA_LABEL[s.area]}</span>
      <span class="shop-score-badge">${s.score}PT</span>
    </div>
  `).join('');
