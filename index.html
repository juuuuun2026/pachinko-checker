<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パチンコ特定日チェッカー | 総武線沿い版（千葉〜秋葉原）</title>
<meta name="description" content="総武線沿い（千葉〜秋葉原）のパチンコ店特定日を日付・店名で即検索。約40店舗のイベント日パターンを完全収録。台データ・P-worldへの直リンク付き。">
<style>
/* ===== DESIGN SYSTEM ===== */
:root {
  --bg-base:      #0a0a14;
  --bg-card:      rgba(18, 18, 36, 0.85);
  --color-gold:   #f0c040;
  --color-gold2:  #e08020;
  --color-cyan:   #00d4ff;
  --color-red:    #ff3a3a;
  --color-text:   #e8e8f0;
  --color-muted:  #8888aa;
  --color-border: rgba(240, 192, 64, 0.25);
  --glow-gold:    0 0 16px rgba(240, 192, 64, 0.35);
  --glow-cyan:    0 0 16px rgba(0, 212, 255, 0.35);
  --radius-sm:    8px;
  --radius-md:    14px;
  --radius-lg:    20px;
  --gap-sm:       8px;
  --gap-md:       16px;
  --gap-lg:       24px;
  --font-ja:      'Hiragino Sans', 'Meiryo', 'Yu Gothic', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-ja);
  background: var(--bg-base);
  color: var(--color-text);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 15% 40%, rgba(0,212,255,0.04) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 15%, rgba(240,192,64,0.05) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 90%, rgba(255,58,58,0.03) 0%, transparent 50%);
}

/* ===== NAV ===== */
.site-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8, 8, 18, 0.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--color-border);
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 var(--gap-md);
  height: 52px;
}
.nav-brand {
  font-size: 0.95rem;
  font-weight: bold;
  color: var(--color-gold);
  text-decoration: none;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-shadow: var(--glow-gold);
}
.site-nav a.nav-link {
  color: var(--color-muted);
  text-decoration: none;
  font-size: 0.8rem;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  transition: color 0.2s, background 0.2s;
  white-space: nowrap;
}
.site-nav a.nav-link:hover,
.site-nav a.nav-link.active {
  color: var(--color-gold);
  background: rgba(240, 192, 64, 0.08);
}

/* ===== LAYOUT ===== */
.page-container {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 var(--gap-md) 60px;
}

/* ===== HERO ===== */
.page-hero {
  text-align: center;
  padding: 32px 0 20px;
}
.hero-icon { font-size: 2.8rem; margin-bottom: 8px; filter: drop-shadow(0 0 12px rgba(240,192,64,0.6)); }
.page-hero h1 {
  font-size: 1.5rem;
  font-weight: bold;
  color: var(--color-gold);
  margin-bottom: 6px;
  text-shadow: var(--glow-gold);
  letter-spacing: 0.02em;
}
.page-hero p { font-size: 0.85rem; color: var(--color-muted); }

/* ===== GLASS CARD ===== */
.glass-card {
  background: var(--bg-card);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--gap-md);
  margin-bottom: var(--gap-md);
}

/* ===== TABS ===== */
.tabs { display: flex; gap: var(--gap-sm); margin-bottom: var(--gap-md); }
.tab-btn {
  flex: 1;
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.03);
  color: var(--color-muted);
  font-size: 0.95rem;
  font-family: var(--font-ja);
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn.active {
  border-color: var(--color-gold);
  color: var(--color-gold);
  background: rgba(240, 192, 64, 0.08);
  box-shadow: var(--glow-gold);
}

/* ===== FORM ELEMENTS ===== */
.glass-card label {
  font-size: 0.82rem;
  color: var(--color-muted);
  display: block;
  margin-bottom: 6px;
  margin-top: 12px;
}
.glass-card label:first-child { margin-top: 0; }

.glass-card input[type="date"],
.glass-card input[type="text"] {
  width: 100%;
  padding: 12px;
  font-size: 1rem;
  font-family: var(--font-ja);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius-sm);
  background: rgba(0,0,0,0.35);
  color: var(--color-text);
  margin-bottom: var(--gap-md);
  transition: border-color 0.2s;
}
.glass-card input:focus {
  outline: none;
  border-color: var(--color-gold);
  box-shadow: 0 0 0 2px rgba(240,192,64,0.15);
}

/* ===== AREA BUTTONS ===== */
.area-btns { display: flex; gap: var(--gap-sm); margin-bottom: var(--gap-md); }
.area-btn {
  flex: 1;
  padding: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.03);
  color: var(--color-muted);
  font-size: 0.95rem;
  font-family: var(--font-ja);
  cursor: pointer;
  transition: all 0.2s;
}
.area-btn.active {
  border-color: var(--color-cyan);
  color: var(--color-cyan);
  background: rgba(0, 212, 255, 0.08);
}

/* ===== PRIMARY BUTTON ===== */
.btn-primary {
  width: 100%;
  padding: 14px;
  font-size: 1.05rem;
  font-weight: bold;
  font-family: var(--font-ja);
  background: linear-gradient(135deg, var(--color-gold), var(--color-gold2));
  color: #111;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  box-shadow: var(--glow-gold);
  transition: opacity 0.15s, transform 0.1s;
}
.btn-primary:active { opacity: 0.85; transform: scale(0.99); }

/* ===== RESULTS ===== */
.result-date {
  text-align: center;
  font-size: 0.88rem;
  color: var(--color-muted);
  margin-bottom: var(--gap-md);
  padding: 10px;
  background: rgba(240,192,64,0.05);
  border-radius: var(--radius-sm);
  border: 1px solid var(--color-border);
}
.result-date span { color: var(--color-gold); font-weight: bold; font-size: 1rem; }

.section-title {
  font-size: 0.95rem;
  font-weight: bold;
  color: var(--color-gold);
  margin-bottom: 12px;
  padding-left: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-title::before {
  content: '';
  display: inline-block;
  width: 3px;
  height: 1em;
  background: var(--color-gold);
  border-radius: 2px;
}

/* ===== RANK CARDS ===== */
.rank-card {
  background: var(--bg-card);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  margin-bottom: 10px;
  border-left: 3px solid #555;
  transition: transform 0.15s;
}
.rank-card:active { transform: scale(0.99); }
.rank-card.rank-1 { border-left-color: #ffd700; box-shadow: 0 0 18px rgba(255,215,0,0.2); }
.rank-card.rank-2 { border-left-color: #c0c0c0; box-shadow: 0 0 12px rgba(192,192,192,0.12); }
.rank-card.rank-3 { border-left-color: #cd7f32; box-shadow: 0 0 12px rgba(205,127,50,0.15); }
.rank-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.rank-medal { font-size: 1.4rem; }
.rank-name { font-size: 1.02rem; font-weight: bold; color: #fff; flex: 1; }
.rank-area {
  font-size: 0.72rem;
  background: rgba(255,255,255,0.08);
  color: var(--color-muted);
  padding: 2px 8px;
  border-radius: 20px;
}
.rank-score {
  font-size: 0.75rem;
  background: rgba(240,192,64,0.15);
  color: var(--color-gold);
  border: 1px solid rgba(240,192,64,0.3);
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: bold;
}
.rank-patterns { display: flex; flex-wrap: wrap; gap: 6px; }
.pattern-tag {
  font-size: 0.75rem;
  background: rgba(0,212,255,0.08);
  color: var(--color-cyan);
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid rgba(0,212,255,0.2);
}

/* ===== ALL LIST ===== */
.all-list { margin-top: 20px; }
.shop-row {
  display: flex;
  align-items: flex-start;
  padding: 12px 14px;
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  gap: 10px;
  transition: border-color 0.15s;
}
.shop-row:hover { border-color: var(--color-border); }
.shop-rank-num { font-size: 0.8rem; color: #555; width: 24px; text-align: center; flex-shrink: 0; padding-top: 2px; }
.shop-name-wrap { flex: 1; min-width: 0; }
.shop-name { font-size: 0.95rem; font-weight: 500; }
.shop-patterns-small { font-size: 0.72rem; color: var(--color-muted); margin-top: 2px; }
.shop-area-badge {
  font-size: 0.7rem;
  color: var(--color-muted);
  background: rgba(255,255,255,0.05);
  padding: 2px 7px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}
.shop-score-badge {
  font-size: 0.72rem;
  background: rgba(0,212,255,0.08);
  color: var(--color-cyan);
  border: 1px solid rgba(0,212,255,0.2);
  padding: 2px 8px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}

.no-result { text-align: center; color: #555; padding: 40px 0; font-size: 0.95rem; }
.count-badge { font-size: 0.82rem; color: var(--color-muted); margin-bottom: 10px; padding-left: 4px; }

/* ===== SHOP LINKS ===== */
.shop-links { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 10px 0 0; }
.link-btn {
  display: block;
  text-align: center;
  padding: 8px 4px;
  border-radius: var(--radius-sm);
  font-size: 0.78rem;
  font-weight: bold;
  text-decoration: none;
  transition: opacity 0.15s;
}
.link-btn:active { opacity: 0.75; }
.link-btn-map     { background: rgba(93,204,138,0.1);  color: #5dcc8a; border: 1px solid rgba(93,204,138,0.25); }
.link-btn-web     { background: rgba(122,176,255,0.1); color: #7ab0ff; border: 1px solid rgba(122,176,255,0.25); }
.link-btn-pworld  { background: rgba(255,138,138,0.1); color: #ff8a8a; border: 1px solid rgba(255,138,138,0.25); }
.link-btn-daidata { background: rgba(192,122,255,0.1); color: #c07aff; border: 1px solid rgba(192,122,255,0.25); }
.link-btn-site7   { background: rgba(255,176,122,0.1); color: #ffb07a; border: 1px solid rgba(255,176,122,0.25); }

/* ===== SHOP INFO TAGS ===== */
.shop-info-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
.shop-info-tag {
  font-size: 0.78rem;
  background: rgba(255,255,255,0.05);
  color: var(--color-muted);
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.08);
}
.specialty-tag { background: rgba(141,220,138,0.08); color: #8ddc8a; border-color: rgba(141,220,138,0.2); }

/* ===== SHOP DETAIL CARD ===== */
.shop-detail-card {
  background: var(--bg-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 16px;
  margin-bottom: 14px;
}
.shop-detail-name { font-size: 1.1rem; font-weight: bold; color: #fff; margin-bottom: 4px; }
.shop-detail-area {
  font-size: 0.72rem;
  background: rgba(255,255,255,0.07);
  color: var(--color-muted);
  padding: 2px 8px;
  border-radius: 20px;
  display: inline-block;
  margin-bottom: 12px;
}
.shop-detail-section {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 0.83rem;
  color: var(--color-gold);
  font-weight: bold;
  margin: 14px 0 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid rgba(240,192,64,0.15);
}
.event-add-btn {
  font-size: 0.73rem;
  padding: 3px 10px;
  background: rgba(141,220,138,0.1);
  color: #8ddc8a;
  border: 1px solid rgba(141,220,138,0.25);
  border-radius: 20px;
  cursor: pointer;
  font-family: var(--font-ja);
}
.shop-detail-patterns { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }

/* ===== UPCOMING DATES ===== */
.upcoming-month { margin-bottom: 12px; }
.upcoming-month-label { font-size: 0.8rem; color: var(--color-muted); margin-bottom: 6px; }
.upcoming-dates { display: flex; flex-wrap: wrap; gap: 6px; }
.date-chip {
  font-size: 0.8rem;
  background: rgba(0,42,26,0.6);
  color: #5dcc8a;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid rgba(93,204,138,0.2);
}
.date-chip.today {
  background: rgba(42,26,0,0.8);
  color: var(--color-gold);
  border-color: rgba(240,192,64,0.3);
  font-weight: bold;
}

/* ===== SUGGEST ===== */
.suggest-list {
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  overflow: hidden;
}
.suggest-item {
  padding: 11px 14px;
  font-size: 0.95rem;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: background 0.15s;
}
.suggest-item:last-child { border-bottom: none; }
.suggest-item:hover, .suggest-item:active { background: rgba(240,192,64,0.07); }
.suggest-area { font-size: 0.72rem; color: var(--color-muted); margin-left: 8px; }

/* ===== EVENTS ===== */
.event-list { margin-bottom: 8px; }
.event-item { font-size: 0.85rem; color: var(--color-text); padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.event-date { color: var(--color-gold); font-weight: bold; margin-right: 6px; }
.event-empty { font-size: 0.8rem; color: #555; padding: 4px 0; }
.event-form { display: none; gap: 6px; flex-wrap: wrap; margin: 6px 0; }
.event-form input {
  min-width: 100px;
  padding: 8px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(0,0,0,0.4);
  color: var(--color-text);
  font-family: var(--font-ja);
}

/* ===== FOOTER ===== */
.site-footer {
  text-align: center;
  padding: 24px var(--gap-md);
  color: #444;
  font-size: 0.75rem;
  border-top: 1px solid rgba(255,255,255,0.04);
  margin-top: 20px;
}

/* ===== MOBILE NAV OVERFLOW ===== */
@media (max-width: 360px) {
  .site-nav { gap: 2px; }
  .site-nav a.nav-link { padding: 6px 7px; font-size: 0.75rem; }
}
</style>
</head>
<body>

<!-- ナビゲーション -->
<nav class="site-nav">
  <a href="index.html" class="nav-brand">🎰 総武線パチンコ攻略</a>
  <a href="index.html" class="nav-link active">トップ</a>
  <a href="#checker-section" class="nav-link">特定日</a>
  <a href="stations.html" class="nav-link">駅別店舗</a>
</nav>

<!-- メイン -->
<div class="page-container">

  <!-- ヒーロー -->
  <div class="page-hero">
    <div class="hero-icon">🎰</div>
    <h1>パチンコ特定日チェッカー</h1>
    <p>総武線沿い版（千葉〜秋葉原）</p>
  </div>

  <!-- 特定日チェッカー -->
  <section id="checker-section">

    <!-- タブ -->
    <div class="tabs">
      <button class="tab-btn active" id="tab-date" onclick="switchTab('date')">📅 日付で探す</button>
      <button class="tab-btn" id="tab-shop" onclick="switchTab('shop')">🔍 店名で探す</button>
    </div>

    <!-- 日付検索 -->
    <div class="glass-card" id="date-search-box">
      <label>📅 日付を選択</label>
      <input type="date" id="date-input">
      <label>📍 エリア</label>
      <div class="area-btns">
        <button class="area-btn active" data-area="tokyo" onclick="selectArea(this)">東京</button>
        <button class="area-btn" data-area="chiba" onclick="selectArea(this)">千葉</button>
        <button class="area-btn" data-area="both" onclick="selectArea(this)">両方</button>
      </div>
      <button class="btn-primary" onclick="doSearch()">🔍 検索する</button>
    </div>

    <!-- 店名検索 -->
    <div class="glass-card" id="shop-search-box" style="display:none">
      <label>🏪 店名を入力（一部でもOK）</label>
      <input type="text" id="shop-name-input" placeholder="例：マルハン、エスパス、PIA..." oninput="onShopInput(this.value)">
      <div id="suggest-list"></div>
      <button class="btn-primary" onclick="doShopSearch()">🔍 この店の特定日を見る</button>
    </div>

    <!-- 店名検索結果 -->
    <div id="shop-search-results"></div>

    <!-- 日付検索結果 -->
    <div id="results" style="display:none">
      <div class="result-date" id="result-label"></div>

      <div class="section-title">🏆 おすすめランキング TOP3</div>
      <div id="ranking"></div>

      <div class="all-list">
        <div class="section-title">📋 全該当店舗一覧</div>
        <div class="count-badge" id="count-label"></div>
        <div id="shop-list"></div>
      </div>
    </div>

  </section>
</div>

<footer class="site-footer">
  © 2025 総武線パチンコ攻略 — 千葉〜秋葉原 特定日情報
</footer>

<script src="data.js"></script>
<script>
// ===== 初期化 =====
window.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('date-input').value = `${yyyy}-${mm}-${dd}`;

  // 駅ページからの ?shop= で店名プリフィル
  const params = new URLSearchParams(location.search);
  const preShop = params.get('shop');
  if (preShop) {
    switchTab('shop');
    document.getElementById('shop-name-input').value = preShop;
    if (!allShops) allShops = getAllShops();
    const match = allShops.find(s => s.name === preShop);
    if (match) {
      selectedShop = match;
      doShopSearch();
    }
  }
});

// ===== エリア選択 =====
let selectedArea = 'tokyo';
function selectArea(btn) {
  document.querySelectorAll('.area-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedArea = btn.dataset.area;
}

// ===== リンク生成 =====
function getMapsLink(name) {
  return `https://www.google.com/maps/search/${encodeURIComponent(name)}`;
}
function getWebsiteLink(name) {
  const hp = SHOPS[name]?.hp;
  if (hp) return hp;
  return `https://www.google.com/search?q=${encodeURIComponent(name + ' 公式サイト')}`;
}
function getPWorldLink(name) {
  const path = SHOPS[name]?.pworld;
  if (path) return `https://www.p-world.co.jp/${path}.htm`;
  return `https://www.google.com/search?q=site:p-world.co.jp+${encodeURIComponent(name)}`;
}
function getDaidataLink(name) {
  const id = SHOPS[name]?.daidata;
  if (id) return `https://daidata.goraggio.com/${id}`;
  return `https://www.google.com/search?q=${encodeURIComponent(name + ' 台データオンライン')}`;
}
function getSite7Link(name) {
  const url = SHOPS[name]?.site7;
  if (url) return url;
  return `https://www.google.com/search?q=${encodeURIComponent(name + ' サイトセブン')}`;
}
function shopLinksHTML(name) {
  return `<div class="shop-links">
    <a class="link-btn link-btn-map"     href="${getMapsLink(name)}"    target="_blank" rel="noopener">🗺️ マップ</a>
    <a class="link-btn link-btn-web"     href="${getWebsiteLink(name)}" target="_blank" rel="noopener">🌐 公式HP</a>
    <a class="link-btn link-btn-pworld"  href="${getPWorldLink(name)}"  target="_blank" rel="noopener">🎰 P-world</a>
    <a class="link-btn link-btn-daidata" href="${getDaidataLink(name)}" target="_blank" rel="noopener">📊 台データ</a>
    <a class="link-btn link-btn-site7"   href="${getSite7Link(name)}"   target="_blank" rel="noopener">7️⃣ サイト7</a>
  </div>`;
}

// ===== タブ切り替え =====
function switchTab(tab) {
  document.getElementById('tab-date').classList.toggle('active', tab === 'date');
  document.getElementById('tab-shop').classList.toggle('active', tab === 'shop');
  document.getElementById('date-search-box').style.display = tab === 'date' ? 'block' : 'none';
  document.getElementById('shop-search-box').style.display = tab === 'shop' ? 'block' : 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('shop-search-results').style.display = 'none';
}

// ===== 全店舗リスト（サジェスト用）=====
function getAllShops() {
  const all = [];
  for (const area of ['tokyo','chiba']) {
    const seen = new Set();
    for (const pat of Object.keys(DATA[area])) {
      for (const name of DATA[area][pat]) {
        if (!seen.has(name)) { seen.add(name); all.push({ name, area }); }
      }
    }
  }
  return all;
}

let allShops = null;
let selectedShop = null;

function onShopInput(val) {
  if (!allShops) allShops = getAllShops();
  const el = document.getElementById('suggest-list');
  if (!val.trim()) { el.innerHTML = ''; return; }
  const matched = allShops.filter(s => s.name.includes(val.trim())).slice(0, 10);
  if (matched.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = '<div class="suggest-list">' +
    matched.map(s =>
      `<div class="suggest-item" onclick="selectShop('${s.name.replace(/'/g,"\\'")}','${s.area}')">
        ${s.name}<span class="suggest-area">${s.area === 'tokyo' ? '東京' : '千葉'}</span>
      </div>`
    ).join('') + '</div>';
}

function selectShop(name, area) {
  selectedShop = { name, area };
  document.getElementById('shop-name-input').value = name;
  document.getElementById('suggest-list').innerHTML = '';
}

function doShopSearch() {
  const inputVal = document.getElementById('shop-name-input').value.trim();
  if (!inputVal) { alert('店名を入力してください'); return; }
  if (!allShops) allShops = getAllShops();
  const targets = allShops.filter(s => s.name.includes(inputVal));
  if (targets.length === 0) {
    const el = document.getElementById('shop-search-results');
    el.style.display = 'block';
    el.innerHTML = '<div class="no-result">「' + inputVal + '」に一致する店舗が見つかりませんでした</div>';
    return;
  }
  const html = targets.map(s => renderShopDetail(s.name, s.area)).join('');
  const el = document.getElementById('shop-search-results');
  el.innerHTML = '<div class="section-title">🏪 店舗の特定日情報</div>' + html;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth' });
}

function renderShopDetail(name, area) {
  const patterns = [];
  for (const pat of Object.keys(DATA[area])) {
    if ((DATA[area][pat] || []).includes(name)) patterns.push(pat);
  }
  if (patterns.length === 0) return '';
  const patLabels = patterns.map(p => `<span class="pattern-tag">${getPatternLabel(p)}</span>`).join('');
  const today = new Date(); today.setHours(0,0,0,0);
  const upcomingHTML = renderUpcoming(patterns, today);
  const s = SHOPS[name] || {};
  const infoHTML = (() => {
    let h = '';
    if (s.station) h += `<span class="shop-info-tag">🚶 ${s.station}駅 徒歩${s.walk}分</span>`;
    if (s.exchange) h += `<span class="shop-info-tag">💱 ${s.exchange}</span>`;
    if (s.specialty && s.specialty.length) h += s.specialty.map(t => `<span class="shop-info-tag specialty-tag">🏷️ ${t}</span>`).join('');
    return h ? `<div class="shop-info-row">${h}</div>` : '';
  })();
  const savedStr = localStorage.getItem('events_' + name);
  const savedEvents = savedStr ? JSON.parse(savedStr) : [];
  const allEvents = [...(s.events || []), ...savedEvents]
    .sort((a, b) => a.date.localeCompare(b.date))
    .filter(e => e.date >= new Date().toISOString().slice(0,10));
  const eventsHTML = allEvents.length
    ? allEvents.map(e => `<div class="event-item">📅 <span class="event-date">${e.date.slice(5).replace('-','/')}</span> ${e.name}</div>`).join('')
    : '<div class="event-empty">登録イベントなし</div>';
  const safeName = name.replace(/'/g, "\\'");
  return `
    <div class="shop-detail-card">
      <div class="shop-detail-name">${name}</div>
      <span class="shop-detail-area">${area === 'tokyo' ? '東京' : '千葉'}</span>
      ${infoHTML}
      ${shopLinksHTML(name)}
      <div class="shop-detail-section">📅 特定日パターン</div>
      <div class="shop-detail-patterns">${patLabels}</div>
      <div class="shop-detail-section">📆 直近の特定日（今日〜2ヶ月）</div>
      ${upcomingHTML}
      <div class="shop-detail-section">🎉 イベント情報
        <button class="event-add-btn" onclick="showEventForm('${safeName}')">＋ 追加</button>
      </div>
      <div class="event-list" id="evlist-${CSS.escape(name)}">${eventsHTML}</div>
      <div class="event-form" id="evform-${CSS.escape(name)}" style="display:none">
        <input type="date" id="evdate-${CSS.escape(name)}">
        <input type="text" id="evname-${CSS.escape(name)}" placeholder="イベント内容" style="flex:2">
        <button onclick="saveEvent('${safeName}')" style="padding:8px 12px;background:var(--color-gold);color:#111;border:none;border-radius:var(--radius-sm);font-weight:bold;cursor:pointer;font-family:var(--font-ja)">保存</button>
        <button onclick="cancelEventForm('${safeName}')" style="padding:8px 12px;background:rgba(255,255,255,0.07);color:var(--color-muted);border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-ja)">✕</button>
      </div>
    </div>`;
}

function showEventForm(name) { document.getElementById('evform-' + CSS.escape(name)).style.display = 'flex'; }
function cancelEventForm(name) { document.getElementById('evform-' + CSS.escape(name)).style.display = 'none'; }
function saveEvent(name) {
  const dateEl = document.getElementById('evdate-' + CSS.escape(name));
  const nameEl = document.getElementById('evname-' + CSS.escape(name));
  if (!dateEl.value || !nameEl.value.trim()) { alert('日付とイベント内容を入力してください'); return; }
  const key = 'events_' + name;
  const existing = JSON.parse(localStorage.getItem(key) || '[]');
  existing.push({ date: dateEl.value, name: nameEl.value.trim() });
  existing.sort((a,b) => a.date.localeCompare(b.date));
  localStorage.setItem(key, JSON.stringify(existing));
  dateEl.value = ''; nameEl.value = '';
  document.getElementById('evform-' + CSS.escape(name)).style.display = 'none';
  const today = new Date().toISOString().slice(0,10);
  const s = SHOPS[name] || {};
  const allEvents = [...(s.events || []), ...existing]
    .sort((a,b) => a.date.localeCompare(b.date))
    .filter(e => e.date >= today);
  document.getElementById('evlist-' + CSS.escape(name)).innerHTML = allEvents.length
    ? allEvents.map(e => `<div class="event-item">📅 <span class="event-date">${e.date.slice(5).replace('-','/')}</span> ${e.name}</div>`).join('')
    : '<div class="event-empty">登録イベントなし</div>';
}

// ===== 直近特定日 =====
function renderUpcoming(patterns, today) {
  const months = [
    new Date(today.getFullYear(), today.getMonth(), 1),
    new Date(today.getFullYear(), today.getMonth() + 1, 1)
  ];
  let html = '';
  for (const monthStart of months) {
    const yr = monthStart.getFullYear();
    const mo = monthStart.getMonth();
    const lastDay = new Date(yr, mo + 1, 0).getDate();
    const matchDays = new Set();
    for (let d = 1; d <= lastDay; d++) {
      const date = new Date(yr, mo, d);
      if (getActivePatterns(date).some(p => patterns.includes(p))) matchDays.add(d);
    }
    if (matchDays.size === 0) continue;
    const chips = [...matchDays].sort((a,b) => a-b).map(d => {
      const dt = new Date(yr, mo, d); dt.setHours(0,0,0,0);
      const isToday = dt.getTime() === today.getTime();
      if (dt < today && !isToday) return '';
      return `<span class="date-chip${isToday ? ' today' : ''}">${d}日(${WEEKDAYS[dt.getDay()]})${isToday ? '★今日' : ''}</span>`;
    }).filter(Boolean).join('');
    if (!chips) continue;
    html += `<div class="upcoming-month">
      <div class="upcoming-month-label">${yr}年${mo+1}月</div>
      <div class="upcoming-dates">${chips}</div>
    </div>`;
  }
  return html || '<div style="color:#555;font-size:0.85rem;">直近2ヶ月の特定日はありません</div>';
}

// ===== パターン計算 =====
const WEEKDAYS = ["日","月","火","水","木","金","土"];

function getPatternLabel(key) {
  if (key.startsWith('d')) return key[1] === '0' ? '0のつく日' : `${key[1]}のつく日`;
  if (key.startsWith('m')) return `毎月${key.slice(1)}日`;
  if (key.startsWith('w')) return `毎週${WEEKDAYS[parseInt(key[1])]}曜日`;
  if (key.startsWith('nth_')) { const [,n,w] = key.split('_'); return `毎月第${n}${WEEKDAYS[parseInt(w)]}曜日`; }
  if (key.startsWith('last_')) return `毎月最終${WEEKDAYS[parseInt(key[5])]}曜日`;
  if (key === 'zorome') return 'ゾロ目（11・22日）';
  if (key === 'md') return '月日が重なる日';
  return key;
}

function getActivePatterns(date) {
  const day = date.getDate();
  const month = date.getMonth() + 1;
  const weekday = date.getDay();
  const patterns = [`d${day % 10}`, `m${day}`, `w${weekday}`];
  const firstDayOfMonth = new Date(date.getFullYear(), date.getMonth(), 1).getDay();
  const firstOccurrence = ((weekday - firstDayOfMonth + 7) % 7) + 1;
  const nth = Math.floor((day - firstOccurrence) / 7) + 1;
  patterns.push(`nth_${nth}_${weekday}`);
  const lastDay = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
  if (day + 7 > lastDay) patterns.push(`last_${weekday}`);
  if (day === 11 || day === 22) patterns.push('zorome');
  if (month === day) patterns.push('md');
  return patterns;
}

// ===== 検索実行 =====
function doSearch() {
  const dateVal = document.getElementById('date-input').value;
  if (!dateVal) { alert('日付を選択してください'); return; }
  const date = new Date(dateVal + 'T00:00:00');
  const patterns = getActivePatterns(date);
  const areas = selectedArea === 'both' ? ['tokyo','chiba'] : [selectedArea];
  const shopMap = {};
  for (const area of areas) {
    for (const pat of patterns) {
      for (const name of (DATA[area][pat] || [])) {
        const key = `${area}::${name}`;
        if (!shopMap[key]) shopMap[key] = { name, area, labels: [], score: 0 };
        shopMap[key].labels.push(getPatternLabel(pat));
        shopMap[key].score++;
      }
    }
  }
  const sorted = Object.values(shopMap).sort((a,b) => b.score - a.score);
  const yyyy = date.getFullYear(), mm = date.getMonth()+1, dd = date.getDate();
  document.getElementById('result-label').innerHTML =
    `<span>${yyyy}年${mm}月${dd}日（${WEEKDAYS[date.getDay()]}）</span> の結果`;
  renderRanking(sorted.slice(0,3));
  renderList(sorted);
  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

const MEDALS = ['🥇','🥈','🥉'];
const AREA_LABEL = { tokyo: '東京', chiba: '千葉' };

function renderRanking(top) {
  const el = document.getElementById('ranking');
  if (top.length === 0) { el.innerHTML = '<div class="no-result">該当店舗がありません</div>'; return; }
  el.innerHTML = top.map((s,i) => `
    <div class="rank-card rank-${i+1}">
      <div class="rank-header">
        <span class="rank-medal">${MEDALS[i]}</span>
        <span class="rank-name">${s.name}</span>
        <span class="rank-area">${AREA_LABEL[s.area]}</span>
        <span class="rank-score">${s.score}パターン</span>
      </div>
      <div class="rank-patterns">${s.labels.map(l => `<span class="pattern-tag">${l}</span>`).join('')}</div>
      ${shopLinksHTML(s.name)}
    </div>
  `).join('');
}

function renderList(shops) {
  document.getElementById('count-label').textContent = `${shops.length}店舗が該当`;
  const el = document.getElementById('shop-list');
  if (shops.length === 0) { el.innerHTML = '<div class="no-result">該当店舗がありません</div>'; return; }
  el.innerHTML = shops.map((s,i) => `
    <div class="shop-row">
      <span class="shop-rank-num">${i+1}</span>
      <div class="shop-name-wrap">
        <div class="shop-name">${s.name}</div>
        <div class="shop-patterns-small">${s.labels.join(' / ')}</div>
        ${shopLinksHTML(s.name)}
      </div>
      <span class="shop-area-badge">${AREA_LABEL[s.area]}</span>
      <span class="shop-score-badge">${s.score}PT</span>
    </div>
  `).join('');
}
</script>
