<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">駅の店舗 | 総武線パチンコ攻略</title>
<meta name="description" id="page-desc" content="総武線沿い パチンコ店舗情報">
<!-- OGP -->
<meta property="og:type"        content="website">
<meta property="og:title"       id="og-title"  content="駅の店舗 | 総武線パチンコ攻略">
<meta property="og:description" id="og-desc"   content="総武線沿い パチンコ店舗情報">
<meta property="og:url"         id="og-url"    content="https://pachinko-checker.netlify.app/stations.html">
<meta property="og:site_name"   content="総武線パチンコ攻略">
<meta property="og:locale"      content="ja_JP">
<meta name="twitter:card"        content="summary">
<meta name="twitter:title"       id="tw-title" content="駅の店舗 | 総武線パチンコ攻略">
<meta name="twitter:description" id="tw-desc"  content="総武線沿い パチンコ店舗情報">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>🎰</text></svg>">
<style>
:root {
  --bg:         #f1f5f9;
  --white:      #ffffff;
  --primary:    #1d4ed8;
  --primary-l:  #3b82f6;
  --primary-bg: #eff6ff;
  --primary-br: #bfdbfe;
  --accent:     #b45309;
  --accent-bg:  #fef3c7;
  --accent-br:  #fcd34d;
  --green:      #15803d;
  --green-bg:   #f0fdf4;
  --orange:     #c2410c;
  --orange-bg:  #fff7ed;
  --orange-br:  #fed7aa;
  --text:       #0f172a;
  --text-sub:   #475569;
  --text-muted: #94a3b8;
  --border:     #e2e8f0;
  --border-d:   #cbd5e1;
  --shadow-sm:  0 1px 3px rgba(0,0,0,0.07);
  --shadow-md:  0 4px 16px rgba(0,0,0,0.08);
  --r-s: 6px; --r-m: 10px; --r-l: 14px;
  --font: 'Hiragino Sans','Meiryo','Yu Gothic',sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

/* NAV */
.site-nav {
  position: sticky; top: 0; z-index: 200;
  background: var(--white); border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  display: flex; align-items: center; gap: 4px;
  padding: 0 20px; height: 58px;
}
.nav-brand {
  font-size: 1rem; font-weight: 800; color: var(--primary);
  text-decoration: none; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nav-link {
  color: var(--text-sub); text-decoration: none;
  font-size: 0.82rem; font-weight: 500;
  padding: 6px 12px; border-radius: var(--r-s);
  transition: color .15s, background .15s; white-space: nowrap;
}
.nav-link:hover  { color: var(--primary); background: var(--primary-bg); }
.nav-link.active { color: var(--primary); background: var(--primary-bg); font-weight: 700; }

/* LAYOUT */
.page-wrap { max-width: 680px; margin: 0 auto; padding: 0 20px 80px; }

/* BACK LINK */
.back-link {
  display: inline-flex; align-items: center; gap: 5px;
  color: var(--text-sub); text-decoration: none;
  font-size: 0.84rem; padding: 16px 0 8px;
  transition: color .15s;
}
.back-link:hover { color: var(--primary); }

/* HERO */
.page-hero { padding: 8px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.page-hero h1 {
  font-size: 1.5rem; font-weight: 900; color: var(--text);
  letter-spacing: -0.02em; margin-bottom: 5px;
}
.page-hero p { font-size: 0.84rem; color: var(--text-sub); }
.shop-count-label {
  display: inline-block; margin-top: 10px;
  font-size: 0.78rem; color: var(--primary);
  background: var(--primary-bg); border: 1px solid var(--primary-br);
  padding: 4px 14px; border-radius: 20px; font-weight: 600;
}

/* SHOP CARD */
.shop-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--r-l); padding: 18px 16px;
  margin-bottom: 12px; box-shadow: var(--shadow-sm);
  transition: box-shadow .2s, border-color .2s;
}
.shop-card:hover { box-shadow: var(--shadow-md); border-color: var(--primary-br); }
.shop-card__name {
  font-size: 1.05rem; font-weight: 800; color: var(--text); margin-bottom: 10px;
}

/* META TAGS */
.shop-card__meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.meta-tag {
  font-size: 0.74rem; font-weight: 500;
  padding: 4px 10px; border-radius: 20px;
  background: #f8fafc; color: var(--text-sub); border: 1px solid var(--border);
}
.meta-tag--walk  { color: var(--primary); background: var(--primary-bg); border-color: var(--primary-br); }
.meta-tag--hours { color: var(--green);   background: var(--green-bg);   border-color: #bbf7d0; }
.meta-tag--total { color: var(--accent);  background: var(--accent-bg);  border-color: var(--accent-br); }
.meta-tag--slot  { color: var(--orange);  background: var(--orange-bg);  border-color: var(--orange-br); }

/* ACTION BUTTONS */
.shop-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.action-btn {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  padding: 10px 6px; border-radius: var(--r-m);
  font-size: 0.76rem; font-weight: 600; text-decoration: none; text-align: center;
  border: 1px solid var(--border-d); color: var(--text-sub); background: var(--white);
  transition: all .15s;
}
.action-btn:active { transform: scale(.97); }
.action-btn--checker { color: var(--primary); background: var(--primary-bg); border-color: var(--primary-br); }
.action-btn--checker:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
.action-btn--pworld  { color: var(--accent); background: var(--accent-bg); border-color: var(--accent-br); }
.action-btn--pworld:hover  { background: var(--accent); color: #fff; border-color: var(--accent); }
.action-btn--daidata { color: #7c3aed; background: #f5f3ff; border-color: #c4b5fd; }
.action-btn--daidata:hover { background: #7c3aed; color: #fff; border-color: #7c3aed; }

/* EMPTY / ERROR */
.no-shops-msg { text-align: center; padding: 60px 16px; color: var(--text-muted); }
.no-shops-msg .no-shops-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
.no-shops-msg p { font-size: 0.9rem; line-height: 1.7; }
.error-msg { text-align: center; padding: 60px 16px; color: #dc2626; }

/* FOOTER */
.site-footer {
  background: var(--white); border-top: 1px solid var(--border);
  padding: 32px 20px 28px; text-align: center;
}
.footer-brand { font-size: 1rem; font-weight: 800; color: var(--primary); margin-bottom: 12px; }
.footer-links { display: flex; gap: 24px; justify-content: center; margin-bottom: 10px; }
.footer-links a { font-size: .78rem; color: var(--text-sub); text-decoration: none; transition: color .15s; }
.footer-links a:hover { color: var(--primary); }
.footer-desc { font-size: .73rem; color: var(--text-muted); margin-bottom: 8px; }
.footer-copy { font-size: .7rem; color: var(--text-muted); }

@media (max-width: 480px) {
  .shop-actions { grid-template-columns: 1fr 1fr; }
  .action-btn:last-child { grid-column: span 2; }
}
@media (max-width: 400px) {
  .nav-link { padding: 6px 8px; font-size: .78rem; }
  .shop-actions { grid-template-columns: 1fr; }
  .action-btn:last-child { grid-column: auto; }
}
</style>
</head>
<body>

<nav class="site-nav">
  <a href="index.html" class="nav-brand">🎰 総武線パチンコ攻略</a>
  <a href="index.html" class="nav-link">トップ</a>
  <a href="index.html#checker-section" class="nav-link">特定日</a>
  <a href="stations.html" class="nav-link active">駅別店舗</a>
</nav>

<div class="page-wrap">
  <a href="stations.html" class="back-link">← 駅一覧に戻る</a>

  <div class="page-hero" id="station-hero"></div>
  <div id="shop-cards"></div>
</div>

<footer class="site-footer">
  <div class="footer-brand">🎰 総武線パチンコ攻略</div>
  <div class="footer-links">
    <a href="index.html">トップ</a>
    <a href="index.html#checker-section">特定日チェッカー</a>
    <a href="stations.html">駅別店舗</a>
  </div>
  <div class="footer-desc">千葉〜秋葉原 全20駅 約40店舗の特定日情報を無料提供</div>
  <div class="footer-copy">© 2025 総武線パチンコ攻略</div>
</footer>

<script src="data.js"></script>
<script>
function getPworldLink(name) {
  const path = SHOPS[name]?.pworld;
  if (path) return `https://www.p-world.co.jp/${path}.htm`;
  return `https://www.p-world.co.jp/search.htm?kw=${encodeURIComponent(name)}`;
}
function getDaidataLink(name) {
  const id = SHOPS[name]?.daidata;
  if (id) return `https://daidata.goraggio.com/${id}`;
  return `https://www.google.com/search?q=${encodeURIComponent(name + ' 台データオンライン')}`;
}

function renderStationPage() {
  const params = new URLSearchParams(location.search);
  const stationId = params.get('s');
  const station = STATIONS.find(s => s.id === stationId);

  if (!station) {
    document.getElementById('station-hero').innerHTML =
      '<div class="error-msg">⚠️ 駅が見つかりません。<br><a href="stations.html" style="color:var(--primary)">駅一覧に戻る</a></div>';
    return;
  }

  const stationJa = station.ja;

  // SEO + OGP
  const pageTitle = `${stationJa}駅のパチンコ店舗 | 総武線パチンコ攻略`;
  const pageDesc  = `${stationJa}駅周辺のパチンコ店舗一覧。徒歩分・特定日情報・P-world・台データへの直リンク付き。`;
  const pageUrl   = `https://pachinko-checker.netlify.app/station.html?s=${encodeURIComponent(stationId)}`;
  document.getElementById('page-title').textContent = pageTitle;
  document.getElementById('page-desc').setAttribute('content', pageDesc);
  document.getElementById('og-title').setAttribute('content', pageTitle);
  document.getElementById('og-desc').setAttribute('content', pageDesc);
  document.getElementById('og-url').setAttribute('content', pageUrl);
  document.getElementById('tw-title').setAttribute('content', pageTitle);
  document.getElementById('tw-desc').setAttribute('content', pageDesc);

  const stationShops = Object.entries(SHOPS)
    .filter(([, data]) => data.station === stationJa)
    .sort(([, a], [, b]) => a.walk - b.walk);

  document.getElementById('station-hero').innerHTML = `
    <h1>🚉 ${stationJa}駅</h1>
    <p>周辺のパチンコ・スロット店舗</p>
    ${stationShops.length > 0 ? `<span class="shop-count-label">${stationShops.length}店舗</span>` : ''}`;

  const container = document.getElementById('shop-cards');

  if (stationShops.length === 0) {
    container.innerHTML = `
      <div class="no-shops-msg">
        <div class="no-shops-icon">🔍</div>
        <p>この駅の店舗情報はまだ登録されていません。<br>
           <a href="stations.html" style="color:var(--primary);text-decoration:none;">← 他の駅を見る</a></p>
      </div>`;
    return;
  }

  container.innerHTML = stationShops.map(([name, data]) => {
    const checkerUrl = `index.html?shop=${encodeURIComponent(name)}`;
    const pworldUrl  = getPworldLink(name);
    const daidataUrl = getDaidataLink(name);

    const hoursTag = data.hours
      ? `<span class="meta-tag meta-tag--hours">🕐 ${data.hours}</span>`
      : `<span class="meta-tag">🕐 営業時間 要確認</span>`;

    const machineTag = (data.p_total && data.s_total)
      ? `<span class="meta-tag meta-tag--total">🎰 P ${data.p_total}台</span><span class="meta-tag meta-tag--slot">🎲 S ${data.s_total}台</span>`
      : `<span class="meta-tag">🎰 台数 要確認</span>`;

    return `
      <div class="shop-card">
        <div class="shop-card__name">${name}</div>
        <div class="shop-card__meta">
          <span class="meta-tag meta-tag--walk">🚶 徒歩${data.walk}分</span>
          ${hoursTag}
          ${machineTag}
        </div>
        <div class="shop-actions">
          <a class="action-btn action-btn--checker" href="${checkerUrl}">📅 特定日</a>
          <a class="action-btn action-btn--pworld"  href="${pworldUrl}" target="_blank" rel="noopener">🌐 P-world</a>
          <a class="action-btn action-btn--daidata" href="${daidataUrl}" target="_blank" rel="noopener">📊 台データ</a>
        </div>
      </div>`;
  }).join('');
}

renderStationPage();
</script>
</body>
</html>
