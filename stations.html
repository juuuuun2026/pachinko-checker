<style>
:root {
  --bg:         #f1f5f9;
  --white:      #ffffff;
  --primary:    #1d4ed8;
  --primary-l:  #3b82f6;
  --primary-bg: #eff6ff;
  --primary-br: #bfdbfe;
  --text:       #0f172a;
  --text-sub:   #475569;
  --text-muted: #94a3b8;
  --border:     #e2e8f0;
  --border-d:   #cbd5e1;
  --shadow-sm:  0 1px 3px rgba(0,0,0,0.07);
  --shadow-md:  0 4px 16px rgba(0,0,0,0.08);
  --shadow-premium:       0 8px 28px rgba(15,23,42,0.10), 0 2px 6px rgba(15,23,42,0.06);
  --shadow-premium-hover: 0 14px 40px rgba(15,23,42,0.14), 0 4px 10px rgba(15,23,42,0.08);
  --gold:      #c9a14a;
  --gold-bg:   #fdf8eb;
  --gold-br:   #ecd9a3;
  --gold-grad: linear-gradient(135deg, #e0bf6e 0%, #c9a14a 50%, #9a7a2e 100%);
  --r-s: 6px; --r-m: 10px; --r-l: 14px;
  --font: 'Hiragino Sans','Meiryo','Yu Gothic',sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

/* NAV */
.site-nav {
  position: sticky; top: 0; z-index: 200;
  background: var(--white); border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  display: flex; align-items: center; gap: 4px;
  padding: 0 20px; height: 58px;
}
.nav-brand {
  font-size: 1rem; font-weight: 800; color: var(--primary);
  text-decoration: none; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nav-link {
  color: var(--text-sub); text-decoration: none;
  font-size: 0.82rem; font-weight: 500;
  padding: 6px 12px; border-radius: var(--r-s);
  transition: color .15s, background .15s; white-space: nowrap;
}
.nav-link:hover  { color: var(--primary); background: var(--primary-bg); }
.nav-link.active { color: var(--primary); background: var(--primary-bg); font-weight: 700; }

/* LAYOUT */
.page-wrap { max-width: 680px; margin: 0 auto; padding: 0 20px 80px; }

/* HERO */
.page-hero {
  padding: 36px 0 28px; text-align: center;
  border-bottom: 1px solid var(--border); margin-bottom: 24px;
}
.hero-icon { font-size: 2.6rem; margin-bottom: 10px; display: block; }
.page-hero h1 {
  font-size: 1.55rem; font-weight: 900; color: var(--text);
  letter-spacing: -0.02em; margin-bottom: 6px;
}
.page-hero p { font-size: 0.85rem; color: var(--text-sub); }

/* LINE BAR */
.line-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; margin-bottom: 20px;
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--r-l); box-shadow: var(--shadow-sm);
}
.line-dot {
  width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  background: var(--primary);
}
.line-bar-text { font-size: 0.83rem; color: var(--text-sub); }
.line-bar-text strong { color: var(--primary); }

/* SEC HEAD */
.sec-head {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
}
.sec-head h2 { font-size: 0.95rem; font-weight: 800; color: var(--text); }
.sec-badge {
  margin-left: auto; font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.1em; padding: 3px 10px; border-radius: 20px;
  background: var(--primary-bg); color: var(--primary); border: 1px solid var(--primary-br);
}

/* STATION GRID */
.station-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 12px;
}

/* STATION CARD */
.station-card {
  position: relative; overflow: hidden; text-decoration: none;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 22px 12px;
  background: linear-gradient(180deg, #fdfdff 0%, var(--white) 100%);
  border-radius: var(--r-l);
  border: 1px solid var(--border); box-shadow: var(--shadow-premium);
  transition: transform .2s, box-shadow .2s, border-color .2s;
  min-height: 96px;
}
.station-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-premium-hover);
  border-color: var(--gold-br);
}
.station-card:not(.station-card--no-shops):hover::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--gold-grad);
}
.station-card__icon { font-size: 1.3rem; margin-bottom: 6px; }
.station-card__name { font-size: 1rem; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
.station-card__count { font-size: 0.72rem; color: var(--text-muted); }
.station-card__count span { color: var(--primary); font-weight: 700; }

/* No shops */
.station-card--no-shops {
  opacity: 0.4; pointer-events: none; cursor: default;
}
.station-card--no-shops .station-card__name { color: var(--text-muted); }

/* 順序番号 */
.station-order {
  position: absolute; top: 7px; left: 10px;
  font-size: 0.62rem; color: var(--text-muted); font-weight: 600;
}

/* FOOTER */
.site-footer {
  background: var(--white); border-top: 1px solid var(--border);
  padding: 32px 20px 28px; text-align: center;
}
.footer-brand { font-size: 1rem; font-weight: 800; color: var(--primary); margin-bottom: 12px; }
.footer-links { display: flex; gap: 24px; justify-content: center; margin-bottom: 10px; }
.footer-links a { font-size: .78rem; color: var(--text-sub); text-decoration: none; transition: color .15s; }
.footer-links a:hover { color: var(--primary); }
.footer-desc { font-size: .73rem; color: var(--text-muted); margin-bottom: 8px; }
.footer-copy { font-size: .7rem; color: var(--text-muted); }

@media (max-width: 400px) {
  .nav-link { padding: 6px 8px; font-size: .78rem; }
  .station-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
}
</style>

<script src="data.js"></script>
<script>
function buildStationGrid() {
  const grid = document.getElementById('station-grid');
  const shopCountByStation = {};
  for (const shopData of Object.values(SHOPS)) {
    const st = shopData.station;
    shopCountByStation[st] = (shopCountByStation[st] || 0) + 1;
  }
  grid.innerHTML = STATIONS.map((st, i) => {
    const count = shopCountByStation[st.ja] || 0;
    const noShops = count === 0;
    const href = `station.html?s=${st.id}`;
    return `
      <a href="${noShops ? '#' : href}"
         class="station-card ${noShops ? 'station-card--no-shops' : ''}"
         ${noShops ? 'aria-disabled="true" tabindex="-1"' : ''}>
        <span class="station-order">${i + 1}</span>
        <div class="station-card__icon">🚉</div>
        <div class="station-card__name">${st.ja}</div>
        <div class="station-card__count">
          ${count > 0 ? `<span>${count}</span> 店舗` : '情報なし'}
        </div>
      </a>`;
  }).join('');
}
buildStationGrid();
</script>
